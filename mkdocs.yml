# MkDocs (Material) — documentation site
# - docs_dir: documentation markdown lives in ./docs
# - site_dir: build output in ./site (served on GitHub Pages)
site_name: "Distributed & Federated Random Forest"
site_url: "https://bowenislandsong.github.io/distributed_random_forest/"

# Match GitHub "edit" links to this repo
repo_name: "GitHub"
repo_url: "https://github.com/Bowenislandsong/distributed_random_forest"
edit_uri: "edit/main/docs/"

# Where Markdown sources live, and where the static site is built
docs_dir: docs
site_dir: site
site_author: "Bowen Song (Bowenislandsong)"
copyright: "Copyright 2021–2024 Bowen Song"

# --- Theme: Material, teal palette with GitHub and Code Copy buttons
theme:
  name: "material"
  language: "en"
  font:
    text: "Roboto"
    code: "Roboto Mono"
  palette:
    - scheme: default
      primary: "teal"
      accent: "teal"
      toggle:
        icon: "material/brightness-7"
        name: "Switch to dark mode"
    - scheme: slate
      primary: "teal"
      accent: "teal"
      toggle:
        icon: "material/brightness-4"
        name: "Switch to light mode"
  features:
    - navigation.expand
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - navigation.path
    - content.code.annotate
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.integrate
  icon:
    repo: "fontawesome/brands/github"
  # logo and favicon from Material defaults

# Common Markdown / syntax extensions
markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.arithmatex
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - toc:
      permalink: true
  - def_list
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Site navigation: ordered pages (merge of enterprise layout + project guides)
nav:
  - "Home": "index.md"
  - "Getting started": "getting-started.md"
  - "How it works": "architecture.md"
  - "Operations": "operations.md"
  - "Examples": "examples.md"
  - "Concepts": "concepts.md"
  - "Patterns (parallel, DP, sharding)": "patterns.md"
  - "Pipeline": "pipeline.md"
  - "Repository & releases": "repository.md"
  - "Federation strategies & DP": "distributed-strategies.md"
  - "API (Python)": "api.md"
  - "License & citation": "citing.md"

# Extra (CSS) under docs/stylesheets/ — use relative file URL for portability
extra_css:
  - "stylesheets/extra.css"

extra:
  # Social links / footer
  social:
    - icon: "fontawesome/brands/github"
      name: "GitHub"
      link: "https://github.com/Bowenislandsong"
    - icon: "material/web"
      name: "Profile"
      link: "https://bowenislandsong.github.io/#/personal"
    - icon: "fontawesome/regular/address-card"
      name: "CV (PDF)"
      link: "https://bowenislandsong.github.io/img/resume/Bowen_Song_Resume.pdf"
    - icon: "fontawesome/brands/orcid"
      name: "ORCID"
      link: "https://orcid.org/0000-0002-5071-3880"
  # Version badge (bump in releases)
  version:
    provider: mike
    default: "latest"

# Notes:
#   - mike (Material versioning) is optional; you can add it later if you want
#   - deploy from GitHub Actions on push to main (or manual workflow_dispatch)

extra_javascript: []

# mkdocs get-deps / strict mode optional for CI; keep minimal now

# Optional privacy / Google Analytics
#     analytics:
#       provider: "google"
#       property: "G-XXXXXXX"   # or UA- if still using old GA

# Optional: strict mode in CI: `mkdocs build --strict`
