# PyPI: upload when a version tag (v*) is pushed. This avoids a second upload
# when you later add a “GitHub Release” from the same tag.
#
# Secret: add PYPI (PyPI API token) in repo Actions secrets.
# https://github.com/pypa/gh-action-pypi-publish
name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate distribution
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check PyPI token is configured
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo '::error::Add repository secret PYPI (PyPI API token from https://pypi.org/manage/account/token/)'
            exit 1
          fi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: "__token__"
          password: ${{ secrets.PYPI }}
          # Attestations (PEP 740) require Trusted Publishing (OIDC + id-token: write),
          # not a static API token. Keep off when using a stored API token.
          attestations: false
